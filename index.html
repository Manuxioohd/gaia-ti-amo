<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="shortcut icon" href="./fav.svg" type="image/x-icon">
  <title>I Love You Forever 💘</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins&display=swap" rel="stylesheet">

  <style>
    /* ---------- Body & Background ---------- */
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      color: white;
      background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 4rem;
      text-align: center;
      text-shadow: 3px 3px 10px rgba(255, 0, 102, 0.7);
      z-index: 2;
    }

    p {
      font-size: 1.8rem;
      text-align: center;
      margin-top: 10px;
      z-index: 2;
      text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.4);
    }

    /* ---------- Heart Animation ---------- */
    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      transform: rotate(45deg);
      animation: float 6s infinite ease-in-out;
      opacity: 0.8;
      z-index: 1;
    }

    .heart:before, .heart:after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      border-radius: 50%;
    }

    .heart:before { top: -10px; left: 0; }
    .heart:after { left: -10px; top: 0; }

    @keyframes float {
      0% { transform: translateY(0) rotate(45deg); opacity: 1; }
      100% { transform: translateY(-100vh) rotate(45deg); opacity: 0; }
    }

    /* ---------- Sparkle Animation ---------- */
    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      opacity: 0.7;
      animation: sparkleAnim 4s linear infinite;
    }

    @keyframes sparkleAnim {
      0%, 100% { transform: scale(0.5); opacity: 0.5; }
      50% { transform: scale(1.5); opacity: 1; }
    }

    /* ---------- Heart Mattress ---------- */
    .heart-mat {
      position: absolute;
      bottom: 0%;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 200px;
      pointer-events: none;
      overflow: visible;
      z-index: 1;
    }

    .heart-mat .mat-heart {
      position: absolute;
      width: 40px;
      height: 40px;
      background: red;
      transform: rotate(45deg);
      opacity: 0.7;
      animation: floatMat 5s infinite ease-in-out;
    }

    .heart-mat .mat-heart:before, .heart-mat .mat-heart:after {
      content: '';
      position: absolute;
      width: 40px;
      height: 40px;
      background: red;
      border-radius: 50%;
    }

    .heart-mat .mat-heart:before { top: -20px; left: 0; }
    .heart-mat .mat-heart:after { left: -20px; top: 0; }

    @keyframes floatMat {
      0% { transform: translateY(0) rotate(45deg); opacity: 0.6; }
      50% { transform: translateY(-50px) rotate(45deg); opacity: 1; }
      100% { transform: translateY(-100px) rotate(45deg); opacity: 0; }
    }

    /* ---------- Cursor Heart Trail ---------- */
    .cursor-heart {
      position: absolute;
      pointer-events: none;
      z-index: 100;
    }

    .cursor-heart:before, .cursor-heart:after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      background: red;
      border-radius: 50%;
      top: -6px;
    }

    .cursor-heart:after { left: -6px; }

    @keyframes growAndFade {
      0% { transform: scale(0); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.6; }
      100% { transform: scale(0); opacity: 0; }
    }

    /* ---------- Controls ---------- */
    #music-toggle, .theme-toggle-wrapper {
      position: absolute;
      top: 20px;
      background: rgba(255, 0, 0, 0.3);
      border: 2px solid rgba(255, 0, 0, 0.5);
      border-radius: 50%;
      width: 45px;
      height: 45px;
      cursor: pointer;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.3s ease;
    }

    #music-toggle { right: 20px; }
    .theme-toggle-wrapper { right: 80px; }

    #music-toggle:hover, .theme-toggle-wrapper:hover { background: rgba(255, 255, 255, 0.4); }

    #music-toggle svg { width: 24px; height: 24px; fill: red; }

    .theme-toggle-circle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background-color: red;
      transition: transform 0.3s ease;
    }

    #theme-toggle-checkbox { display: none; }
    #theme-toggle-checkbox:checked + .theme-toggle-circle { transform: translateX(10px); }

    /* ---------- Themes ---------- */
    body.dark-theme { background: #121212; color: #ffffff; }
    body.romantic-theme { background: #ffe6f2; color: #b30059; }
    body.purple-theme { background: #f2e6ff; color: #4b0082; }
  </style>
</head>

<body>

  <h1>I Love You Gaia, <span id="txt">❤️</span></h1>
  <p id="love-text"></p>

  <div class="heart-mat"></div>

  <audio id="background-music" src="music/music.mp3" autoplay loop></audio>
  
  <button id="music-toggle" title="Toggle Music">
    <span id="icon-playing">
      <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
    </span>
    <span id="icon-muted" style="display: none;">
      <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
    </span>
  </button>

  <div class="theme-toggle-wrapper">
    <input type="checkbox" id="theme-toggle-checkbox" />
    <div class="theme-toggle-circle"></div>
  </div>

  <script>
    // ❤️ Random love lines (Removed requested line)
    const loveLines = [
      
      "uof uof bau bau 💖",
      "spakki☕❤️",
      "sei la persona piu bella del mondo 🙏💘",
      "ti amo tantissimo💞"
    ];
    const loveText = document.getElementById("love-text");
    loveText.textContent = loveLines[Math.floor(Math.random() * loveLines.length)];

    // 💕 Falling Hearts
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = 2 + Math.random() * 3 + "s";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }
    setInterval(createHeart, 300);

    // 🌊 Heart Mattress
    const heartMatContainer = document.querySelector(".heart-mat");
    function createMatHeart() {
      const heart = document.createElement("div");
      heart.classList.add("mat-heart");
      heart.style.left = Math.random() * 95 + "%";
      heart.style.animationDuration = 3 + Math.random() * 3 + "s";
      heartMatContainer.appendChild(heart);
      setTimeout(() => heart.remove(), 5000);
    }
    setInterval(createMatHeart, 200);

    // ✨ Sparkles
    function createSparkle() {
      const sparkle = document.createElement("div");
      sparkle.classList.add("sparkle");
      sparkle.style.top = Math.random() * 100 + "vh";
      sparkle.style.left = Math.random() * 100 + "vw";
      document.body.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 4000);
    }
    setInterval(createSparkle, 200);

    // 💗 Mouse Trail
    const trailLength = 30;
    const hearts = Array.from({ length: trailLength }, () => {
      const h = document.createElement('div');
      h.classList.add('cursor-heart');
      document.body.appendChild(h);
      return h;
    });
    let heartIndex = 0;
    document.addEventListener('mousemove', (e) => {
      const heart = hearts[heartIndex];
      heartIndex = (heartIndex + 1) % trailLength;
      heart.style.left = `${e.clientX}px`;
      heart.style.top = `${e.clientY}px`;
      heart.style.animation = 'none';
      void heart.offsetWidth;
      heart.style.animation = 'growAndFade 0.7s ease-out forwards';
    });

    // 💌 Name from URL
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");
    if (name) document.getElementById("txt").textContent = `${name} ❤️`;

    // 🎵 Music
    const music = document.getElementById("background-music");
    const musicToggle = document.getElementById("music-toggle");
    const iconMuted = document.getElementById("icon-muted");
    const iconPlaying = document.getElementById("icon-playing");
    let isPlaying = true;
    musicToggle.addEventListener("click", () => {
      if (isPlaying) { music.pause(); iconMuted.style.display = "inline"; iconPlaying.style.display = "none"; }
      else { music.play(); iconMuted.style.display = "none"; iconPlaying.style.display = "inline"; }
      isPlaying = !isPlaying;
    });

    // 🎨 Theme Toggler
    const themeWrapper = document.querySelector(".theme-toggle-wrapper");
    const themes = ["light", "dark", "romantic", "purple"];
    let currentThemeIndex = 0;
    themeWrapper.addEventListener("click", () => {
      currentThemeIndex = (currentThemeIndex + 1) % themes.length;
      document.body.className = themes[currentThemeIndex] + "-theme";
    });
  </script>
</body>
</html>
